{% extends 'base.html' %}
{% block title %}Login - DevBlog{% endblock %}
{% block content %}
<div class="max-w-md mx-auto">
  <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 p-8">
    <div class="text-center mb-8">
      <div class="w-14 h-14 bg-sky-100 dark:bg-sky-900/40 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-7 h-7 text-sky-600 dark:text-sky-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/></svg>
      </div>
      <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Welcome Back</h1>
      <p class="text-gray-500 dark:text-gray-400 text-sm mt-1">Sign in to your account</p>
    </div>
    <form method="post" class="space-y-5">
      {% csrf_token %}
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Username</label>
        <input name="username" type="text" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-sky-500 transition text-sm" placeholder="Username"/>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Password</label>
        <input name="password" type="password" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-sky-500 transition text-sm" placeholder="Password"/>
      </div>
      {% if form.errors %}
        <p class="text-red-500 text-sm">Invalid username or password. Please try again.</p>
      {% endif %}
      <button type="submit" class="w-full py-3 bg-sky-600 hover:bg-sky-700 text-white font-semibold rounded-xl transition text-sm">Login</button>
    </form>
    <p class="text-center text-sm text-gray-500 dark:text-gray-400 mt-6">Don't have an account? <a href="{% url 'register' %}" class="text-sky-600 dark:text-sky-400 font-medium hover:underline">Register</a></p>
  </div>
</div>
{% endblock %}
