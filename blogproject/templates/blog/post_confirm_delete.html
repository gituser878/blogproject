{% extends 'base.html' %}
{% block title %}Delete Post - DevBlog{% endblock %}
{% block content %}
<div class="max-w-md mx-auto">
  <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-red-100 dark:border-red-900/30 p-8 text-center">
    <div class="w-14 h-14 bg-red-100 dark:bg-red-900/30 rounded-full flex items-center justify-center mx-auto mb-4">
      <svg class="w-7 h-7 text-red-600 dark:text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
    </div>
    <h1 class="text-xl font-bold text-gray-900 dark:text-white mb-2">Delete Post?</h1>
    <p class="text-gray-600 dark:text-gray-400 text-sm mb-2">You're about to delete:</p>
    <p class="font-semibold text-gray-900 dark:text-white mb-6">"{{ post.title }}"</p>
    <p class="text-red-500 text-xs mb-6">This action cannot be undone.</p>
    <form method="post" class="flex gap-3 justify-center">
      {% csrf_token %}
      <button type="submit" class="px-6 py-2.5 bg-red-600 hover:bg-red-700 text-white font-semibold rounded-xl transition text-sm">Yes, Delete</button>
      <a href="{% url 'post_detail' post.pk %}" class="px-6 py-2.5 bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 font-semibold rounded-xl hover:bg-gray-200 transition text-sm">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
